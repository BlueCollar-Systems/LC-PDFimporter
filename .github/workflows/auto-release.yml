name: auto-release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read and bump version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          cli = pathlib.Path("pdf2dxf.py")
          pyproject = pathlib.Path("pyproject.toml")

          cli_text = cli.read_text(encoding="utf-8")
          match = re.search(r'(__version__\s*=\s*")(\d+)\.(\d+)\.(\d+)(")', cli_text)
          if not match:
              raise SystemExit("Could not parse __version__ from pdf2dxf.py")

          major, minor, patch = map(int, match.groups()[1:4])
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor}.{patch + 1}"

          cli_text = re.sub(
              r'(__version__\s*=\s*")(\d+)\.(\d+)\.(\d+)(")',
              rf'\g<1>{new_version}\5',
              cli_text,
              count=1,
          )
          cli.write_text(cli_text, encoding="utf-8")

          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text = re.sub(
              r'(^version\s*=\s*")(\d+\.\d+\.\d+)(")',
              rf'\g<1>{new_version}\3',
              pyproject_text,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(pyproject_text, encoding="utf-8")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(
              f"old_version={old_version}\nversion={new_version}\n",
              encoding="utf-8",
          )
          PY

      - name: Build release
        run: python build_release.py

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          TITLE="PDF to DXF Converter v${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" --title "$TITLE" --generate-notes --latest dist/*.zip
          fi

      - name: Create version bump pull request
        id: create_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          branch: "automation/version-bump-v${{ steps.version.outputs.version }}"
          delete-branch: true
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version bump generated by `auto-release`.

            Updated files:
            - `pdf2dxf.py`
            - `pyproject.toml`
          add-paths: |
            pdf2dxf.py
            pyproject.toml

      - name: Warn when PR auto-creation is blocked
        if: steps.create_pr.outcome == 'failure'
        run: |
          echo "::warning::Version bump branch was pushed, but this repo currently blocks GitHub Actions from creating pull requests."
          echo "::warning::Enable 'Allow GitHub Actions to create and approve pull requests' or create the PR manually from branch automation/version-bump-v${{ steps.version.outputs.version }}."
