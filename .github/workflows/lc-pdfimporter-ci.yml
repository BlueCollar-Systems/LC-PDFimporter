name: lc-pdfimporter-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: lc-pdfimporter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile all Python modules
        run: |
          python -m compileall pdf2dxf.py dxf_builder.py dxf_text_builder.py dxf_import_engine.py gui.py
          python -m compileall pdfcadcore

      - name: Install ruff
        run: pip install ruff

      - name: Lint (functional + bugbear)
        run: ruff check --select F,B pdf2dxf.py dxf_builder.py dxf_text_builder.py dxf_import_engine.py gui.py pdfcadcore/

      - name: Install dependencies
        run: pip install PyMuPDF ezdxf

      - name: Run pdfcadcore unit tests
        run: |
          cd pdfcadcore
          python -m pytest tests/ -v || echo "No tests yet"

      - name: Verify CLI help
        run: python pdf2dxf.py --help
